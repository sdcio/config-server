apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: config-keyring
  namespace: sdc-system
  labels:
    config.sdcio.dev/keyring: "true"
data:
  # The active key ID — must match one of the key.<id> entries below.
  # Value is the base64 encoding of the plaintext string "key-1".
  primaryKeyID: a2V5LTE=
  # AES-256 key material — 32 raw bytes, base64-encoded.
  key.key-1: Y9ChZrecdbGEDWIjKiXWgH5wUeMKMxBw335l1OJORCY=