apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: config-keyring
  namespace: sdc-system
  labels:
    config.sdcio.dev/keyring: "true"
data:
  # JSON structure must match keyRingData in pkg/keyring/keyring.go:
  #   { "primary": "<id>", "keys": { "<id>": "<base64-32-bytes>" } }
  #
  # Key rotation:
  #   1. Generate new key: dd if=/dev/urandom bs=32 count=1 2>/dev/null | base64
  #   2. Add it to "keys" with a new ID
  #   3. Change "primary" to the new ID
  #   4. Keep old key entry until all SensitiveConfigs are re-encrypted
  #   5. Re-base64 the full JSON and update this field
  #
  # Decoded value: {"primary":"key-1","keys":{"key-1":"Fyap3X+pl8mYv2gV90sdmuy+YJ+FocFf5ygHGxZ+ws4="}}
  keyring.json: eyJwcmltYXJ5Ijoia2V5LTEiLCJrZXlzIjp7ImtleS0xIjoiRnlhcDNYK3BsOG1ZdjJnVjkwc2RtdXkrWUorRm9jRmY1eWdIR3haK3dzND0ifX0=