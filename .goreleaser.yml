version: 2
project_name: config-server
builds:
  - id: api-server
    binary: api-server
    main: ./cmd/api-server/main.go
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
  - id: controller
    binary: controller
    main: ./cmd/controller/main.go
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
dockers_v2:
  - id: api-server-docker
    ids:
      - api-server
    dockerfile: goreleaser.api-server.dockerfile
    images:
      - ghcr.io/sdcio/config-server-api-server
    tags:
      - latest
      - "v{{ .Version }}"
    platforms:
      - linux/amd64
    sbom: false
    flags:
      - "--pull=true"
      - "--provenance=false"
    build_args:
      USERID: "10000"
    labels:
      org.opencontainers.image.created: "{{.Date}}"
      org.opencontainers.image.title: "{{.ProjectName}}-api-server"
      org.opencontainers.image.source: "https://github.com/sdcio/{{.ProjectName}}"
      org.opencontainers.image.version: "v{{.Version }}"
  - id: controller-docker
    ids:
      - controller
    dockerfile: goreleaser.controller.dockerfile
    images:
      - ghcr.io/sdcio/config-server-controller
    tags:
      - latest
      - "v{{ .Version }}"
    platforms:
      - linux/amd64
    sbom: false
    flags:
      - "--pull=true"
      - "--provenance=false"
    build_args:
      USERID: "10000"
    labels:
      org.opencontainers.image.created: "{{.Date}}"
      org.opencontainers.image.title: "{{.ProjectName}}-controller"
      org.opencontainers.image.source: "https://github.com/sdcio/{{.ProjectName}}"
      org.opencontainers.image.version: "v{{.Version }}"
archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else if eq .Arch "arm" }}armv7
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ .Tag }}"
changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
release:
  prerelease: auto
  draft: false
  replace_existing_draft: true
  disable: false
